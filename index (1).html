.app{max-width:680px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.disp{font-family:'Secular One',sans-serif}
.hero{text-align:center;padding:24px 8px 14px}

label{display:block;font-weight:700;margin-bottom:8px;font-size:15px}

.qtext{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:16px}

ן הכביש מסייעת לשמור על מרחק בטוח מכלי הרכב שנוסעים בנתיב הנגדי.", "נהיגה בימין הכביש מאפשרת להקטין את מרחק התגובה במקרה של סכנה מיידית.", "אין כל יתרון לנהיגה בימין הכביש.", "נהיגה בימין הכביש מאפשרת להישאר בתוך התחום המותר – לא יותר מ 40ס\"מ משפת הכביש."], "ans": 0, "media": null}, {"id": "5.16", "tn": 5, "q": "מה היתרון בנהיגה בימין הכביש?", "opts": ["נהיגה בימין הכביש יוצרת מרווח ביטחון בינכם לבין כלי הרכב הנע ממול.", "נהיגה בימין הכביש מאפשרת להישאר בתוך התחום המותר – לא יותר מ 40ס\"מ משפת הכביש.", "נהיגה בימין הכביש מונעת מכלי הרכב שמאחוריכם את האפשרות לעקוף אתכם.", "אין כל יתרון בנהיגה בימין הכביש."], "ans": 0, "media": null}, {"id": "5.17", "tn": 5, "q": "מהו \"שטח מת\"?", "opts": ["שטח מסביב לכלי הרכב שהנהג אינו יכול להבחין בו ובנמצאים בתוכו.", "השטח מסביב לכלי הרכב שהנהג רואה רק במראות.", "השטח מסביב לכלי הרכב שאינו סלול.", "המרחק שהנהג חייב לשמור מכלי רכב אחר בנסיעה לאחור."], "ans": 0, "media": null}, {"id": "5.18", "tn": 5, "q": "האם מותר לנסוע על אי תנועה?", "opts": ["מותר ,אלא אם כן מוצב עליו מכשול בנוי.", "מותר ,אך בתנאי שנוסעים עליו לאט ובזהירות.", "אסור בשום מקרה.", "אסור לנסוע על שטח הפרדה אך מותר לחצות אותו."], "ans": 2, "media": null}, {"id": "5.19", "tn": 5, "q": "כיצד עליכם לנהוג ביציאה מחצר ,מתחנת דלק או מדרך גישה לבית?", "opts": ["עליכם לתת זכות קדימה לכלי הרכב המתקרבים אליכם בכביש שאליו אתם נכנסים ולהולכי הרגל שעל המדרכה.", "במקרה כזה כללי מתן זכות הקדימה זהים לכללים הנהוגים בצומת.", "עליכם לתת זכות קדימה לכלי הרכב הבאים מימין בלבד.", "עליכם לתת זכות קדימה לכלי הרכב הבאים משמאל בלבד."], "ans": 0, "media": null}, {"id": "5.20", "tn": 5, "q": "מהו נתיב האצה?", "opts": ["נתיב המשמש ליציאה מדרך מהירה או מדרך אחרת שאינה עירונית.", "נתיב בירידות תלולות וארוכות המשמש למילוט במקרה של תקלה בבלמים.", "הנתיב השמאלי ביותר שמיועד לכלי רכב שנוסעים במהירות המרבית המותרת.", "נתיב המשמש להגברת המהירות בכניסה לדרך שהתנועה בה מהירה יחסית."], "ans": 3, "media": null}, {"id": "5.21", "tn": 5, "q": "באיזה מהמקרים האלה מותר לחצות אי תנועה המסומן על גבי הדרך?", "opts": ["בכל מקרה שבו תוכנת הניווט מורה לנהג לפנות ימינה או שמאלה.", "חציית אי תנועה מותרת רק לכלי רכב דוגלגלי שעוקף טור מכוניות הנע באיטיות.", "במקרה ששוטר או פקח תנועה מורים לעשות כן.", "במקרה של עומס תנועה חריג בכביש ראשי או בכביש מהיר."], "ans": 2, "media": null}, {"id": "5.22", "tn": 5, "q": "מהו שטח הפרדה בנוי?", "opts": ["קו רצוף המסומן על גבי הכביש ואסור לחצות אותו.", "שול של דרך עירונית הסמוכה לבתי מגורים או למוסדות חינוך.", "שטח המחלק את הדרך לאורכה באמצעות הגבהה או התקן בטיחות.", "שטח שמסומן בקווים לבנים על גבי הכביש וחצייתו אסורה."], "ans": 2, "media": null}, {"id": "5.23", "tn": 5, "q": "כיצד יש לנהוג ברחוב משולב?", "opts": ["יש לנהוג בזהירות כדי להימנע מפגיעה במשתמשי הדרך האחרים.", "יש לנהוג במהירות נמוכה ובשום מקרה לא לנסוע לאחור.", "יש להימנע מנסיעה ברחוב משולב בזמן שילדים משחקים בו.", "יש לצפור בכל כניסה לרחוב משולב או בכל פעם שמתחילים לנסוע בו."], "ans": 0, "media": null}, {"id": "5.24", "tn": 5, "q": "מהו \"אי תנועה\"?", "opts": ["אזור בדרך ביןעירונית שמיועד לעצירה או לחנייה.", "שטח המיועד להפרדה בין נתיבים ומסומן לשם כך על גבי הכביש.", "אזור בדרך עירונית המיועד לחנייה של כלי רכב דוגלגלי.", "מפרץ עצירה המיועד לשימוש במקרה של תקלה בכלי הרכב."], "ans": 1, "media": null}, {"id": "5.25", "tn": 5, "q": "באיזה מהמקרים האלה מותר לכלי רכב לעצור על אי תנועה?", "opts": ["במקרה של תקלה בכלי הרכב.", "במקרה שהנהג עייף וזקוק למנוחה קצרה.", "במקרה שהנהג חייב לענות לשיחת טלפון דחופה.", "במקרה שהנהג גילה שהוא טעה בדרך."], "ans": 0, "media": null}, {"id": "5.26", "tn": 5, "q": "מהו רחוב משולב?", "opts": ["דרך ראשית שאליה משתלבת התנועה מכמה רחובות.", "דרך המיועדת למשחקי ילדים ,להולכי רגל ולתנועת כלי רכב ,ובכניסה אליה מוצב תמרור המורה על כך.", "רחוב שמיועד למשחקי ילדים ,להולכי רגל ולתנועת כלי רכב שאינם מנועיים בלבד.", "נתיב המאפשר השתלבות של כלי רכב בדרך מהירה."], "ans": 1, "media": null}, {"id": "6.1", "tn": 6, "q": "נוסע היושב במושב האחורי של מכונית פרטית חייב לחגור חגורת בטיחות .על מי תחול האחריות אם לא חגר חגורה בזמן הנסיעה?", "opts": ["על הנהג בלבד.", "על הנהג ועל הנוסע.", "על הנוסע בלבד.", "על בעל כלי הרכב."], "ans": 1, "media": null}, {"id": "6.2", "tn": 6, "q": "שבעה חברים נסעו לטיול בשתי מכוניות .בגלל תקלה באחת המכוניות הציע אחד מן החברים שכולם יחזרו הביתה במכונית התקינה אף על פי שבמכונית זו יש רק חמישה מושבים .החבר שנהג במכונית התקינה לא הסכים להסיע את כולם ,אך שני חברים לחצו עליו לעשות זאת בטענה שלא יעלה על הדעת להשאיר שניים מהם מאחור .שני חברים אחרים טענו שאסור להסיע שבעה נוסעים במכונית התקינה, והשאר שתקו כי חששו להתעמת עם חבריהם .בסופו של דבר נכנסו כולם למכונית ונסעו .בגלל המשקל העודף איבדה המכונית את שיווי המשקל שלה בעיקול חד של הכביש ,סטתה לתעלה בצד הדרך והתהפכה. למי יש אחריות להתרחשות התאונה?", "opts": ["לכל הנוסעים במכונית יש אחריות להתרחשות התאונה ,חוץ מלשני החברים שטענו כי אסור להסיע שבעה נוסעים במכונית התקינה.", "רק לנהג יש אחריות להתרחשות התאונה ,משום שהוא נהג במכונית ,ואילו לאחרים אין אחריות לתאונה.", "לנהג ולשני החברים שלחצו עליו להסיע את כולם יש אחריות להתרחשות התאונה .לשאר החברים אין אחריות לתאונה.", "לכל שבעת החברים שבסופו של דבר נסעו במכונית יש אחריות להתרחשות התאונה."], "ans": 3, "media": null}, {"id": "6.3", "tn": 6, "q": "חמישה חברים נסעו במכונית לערב של בילויים .הם סיכמו ביניהם שאחד מהם לא ישתה משקאות אלכוהוליים ויהיה הנהג התורן שיחזיר אותם לבתיהם .לאחר הבילוי התברר ש\"הנהג התורן\" שתה משקאות אלכוהוליים ואינו יכול לנהוג ,ואילו חבר אחר לא שתה משקאות משכרים .שניים מהמבלים לחצו על החבר שלא שתה שינהג ,אך הוא טען שאינו מכיר את המכונית שבה הגיעו ולכן הוא חושש לנהוג בה. רק חברה אחת נמנעה מללחוץ עליו ושתקה .בעקבות הלחץ שהופעל עליו הוא הסכים לנהוג ,ובמהלך הנסיעה התרחשה תאונה שנגרמה משום שלא הכיר את המכונית שבה נהג .למי מהחברים יש אחריות להתרחשות התאונה?", "opts": ["רק לחבר שנהג במכונית יש אחריות להתרחשות התאונה. ך לחברה שלא אמרה דבר אין אחריות", "לכל מי שהיה במכונית יש אחריות להתרחשות התאונה.", "לאיש מהחברים אין אחריות להתרחשות התאונה משום שבתנאים שנוצרו כולם פעלו כמיטב יכולתם.", "לחבר שנהג במכונית ולחברים שלחצו עליו לנהוג יש אחריות להתרחשות התאונה"], "ans": 1, "media": null}, {"id": "6.4", "tn": 6, "q": "קבוצת חברים יצאה לטיול בשיירה של מכוניות .הם הגיעו לצומת והנהג של המכונית הראשונה ניסה להיכנס לצומת ולהשתלב בתנועה הסואנת שעברה בו .במשך זמן רב לא הצליח הנהג של המכונית הראשונה בשיירה להמשיך בנסיעה ,והנהגים במכוניות שאחריו החלו לצפור ללא הפסק כדי לזרז אותו .בכמה מן המכוניות היו גם חברים שטענו כי אסור לצפור כדי לזרז את הנהג שמלפנים ,אך חברים אחרים רטנו על העיכוב בנסיעה .בשלב מסוים נכנס הנהג של המכונית הראשונה לצומת ,אך הצומת לא היה פנוי והתרחשה תאונה בין מכוניתו ובין מכונית שהגיעה מכיוון אחר .למי יש אחריות להתרחשות התאונה?", "opts": ["רק הנהג אחראי להתרחשות התאונה משום שהחל לנסוע בתנאים שלא אפשרו זאת.", "לכל מי שלחץ על הנהג להתחיל בנסיעה יש אחריות להתרחשות התאונה אך לנהג עצמו אין אחריות לכך כי היה נתון ללחץ כבד.", "רק הנהגים של שתי המכוניות שהתנגשו אחראים להתרחשות התאונה .נהגי המכוניות האחרות לא היו מעורבים בתאונה ולכן אין להם אחריות להתרחשותה.", "לחבר שנהג במכונית ולחברים שצפרו ולחצו עליו להמשיך בנסיעה יש אחריות להתרחשות התאונה."], "ans": 3, "media": null}, {"id": "6.5", "tn": 6, "q": "בחור יצא לבלות עם חבריו במועדון .הוא נהג במכונית החדשה של הוריו ,ואיתו נסעו שלושה מחבריו .החבר שישב לידו דחק בו להפגין את הביצועים של המכונית החדשה; הוא לחץ על הנהג להגביר את מהירות הנסיעה והדגיש שמניסיונו האישי אין כל בעיה לנסוע במהירות בקטע דרך כזה .שני החברים שישבו מאחור שתקו כל זמן הנסיעה. בשלב כלשהו איבד הנהג את השליטה על המכונית והיא התהפכה .האם גם לחברים שישבו במושב האחורי יש אחריות להתרחשות התאונה?", "opts": ["גם ליושבים מאחור יש אחריות להתרחשות התאונה ,שכן איש מהם לא ניסה למנוע מן הנהג לנהוג נהיגה מסוכנת. חריות להתרחשות התאונה", "רק לחבר שישב ליד הנהג יש אחריות להתרחשות תאונה ,משום שהוא דחק בנהג לנהוג נהיגה מסוכנת.", "לנהג יש אחריות להתרחשות התאונה כי הוא נהג נהיגה מסוכנת ,ולחבר שישב לידו יש אחריות להתרחשות התאונה כי הוא דחק בו לנהוג כך .לחברים האחרים אין", "אי אפשר לדעת בדיוק למי יש אחריות להתרחשות התאונה – תאונות קורות!"], "ans": 0, "media": null}, {"id": "6.6", "tn": 6, "q": "מה עליכם לעשות אם בזמן הנסיעה חבריכם מתקוטטים וצועקים במושב האחורי?", "opts": ["עליכם להגיב מייד – להסתובב לכיוונם ולדרוש שיפסיקו את המריבה.", "עליכם להשמיע מוזיקה בעוצמה גבוהה כדי להתגבר על הרעש ולהתרכז בנהיגה.", "עליכם לעצור בבטחה בצד הדרך ולא להמשיך בנסיעה עד שחבריכם יירגעו.", "עליכם לבלום בפתאומיות כדי שחבריכם יבינו את הסכנה שבהתנהגותם."], "ans": 2, "media": null}, {"id": "6.7", "tn": 6, "q": "לפני תחילת הנסיעה ביקשתם מחבריכם היושבים במושב האחורי שיחגרו חגורות בטיחות .למרות בקשתכם ,סירבו החברים לחגור וטענו שחגירת החגורות היא באחריותם בלבד .כיצד תנהגו?", "opts": ["תתחילו בנסיעה ,מפני שחגירת החגורות של הנוסעים היא באחריותם בלבד.", "תתחילו בנסיעה ,אך תזהירו את חבריכם שאם תהיה בדיקה של שוטר עליהם להודות שביקשתם מהם לחגור.", "לא תתחילו בנסיעה ,מפני שאי אפשר לשחרר את בלם החניה כל עוד יש נוסעים שאינם חגורים.", "לא תתחילו בנסיעה ,מפני שחגירת החגורות של הנוסעים היא גם באחריות הנוסעים וגם באחריות הנהג."], "ans": 3, "media": null}, {"id": "6.8", "tn": 6, "q": "על מי מוטלת החובה להכיר את חוקי התנועה ולציית להם?", "opts": ["רק על מי שיש לו רישיון נהיגה.", "על כל אדם המשתמש בדרך.", "רק על הנוהגים בכלי רכב.", "רק על הנוהגים בכלי רכב ועל הנוסעים בו."], "ans": 1, "media": null}, {"id": "6.9", "tn": 6, "q": "האם אדם הנוסע בכלי רכב ואינו נוהג בו חייב לציית לחוקי התנועה?", "opts": ["הנוסע בכלי רכב חייב לציית לחוקי התנועה ,אף שאינו נוהג בו.", "הנוסע בכלי רכב חייב לציית לחוקי התנועה רק אם מלאו לו  16שנה.", "הנוסע בכלי רכב אינו חייב לציית לחוקי התנועה אם הנהג מאפשר לו זאת.", "הנוסע בכלי רכב אינו חייב לציית לחוקי התנועה אך מומלץ מאוד שיציית להם."], "ans": 0, "media": null}, {"id": "6.10", "tn": 6, "q": "על מי חלה האחריות שהנוסעים במושב האחורי במכונית פרטית יחגרו חגורות בטיחות?", "opts": ["על הנהג בלבד.", "על הנהג ועל בעל כלי הרכב.", "על הנוסעים בלבד.", "על הנהג ועל הנוסעים."], "ans": 3, "media": null}, {"id": "6.11", "tn": 6, "q": "האם מותר לנוסעים היושבים במושב האחורי להיכנס לכלי רכב או לצאת ממנו מן הצד הפונה אל הכביש?", "opts": ["אסור לחלוטין.", "אסור ,אלא אם כלי הרכב חונה בשמאל הכביש.", "מותר ,אם אין הדבר מסכן את הנוסעים ואת הנהג.", "מותר ,אם אין הדבר מפריע לנוסעים."], "ans": 0, "media": null}, {"id": "6.12", "tn": 6, "q": "אדם שנסע במכונית אך לא נהג בה פתח את דלת המכונית תוך כדי נסיעה ופגע בכך ברוכב אופניים .מי אחראי לפגיעה זו?", "opts": ["גם הנהג וגם הנוסע שפתח את דלת המכונית אחראים לפגיעה זו.", "רק הנוסע אחראי לפגיעה ,שכן הוא שפתח את הדלת בלי להיזהר.", "רק הנהג אחראי לפגיעה ,כי עליו לוודא שכל הנוסעים נוקטים את כל אמצעי הזהירות הנדרשים.", "רק רוכב האופניים אחראי לפגיעה בו ,כי לא שמר על רווח ראוי מהמכונית."], "ans": 0, "media": null}, {"id": "6.13", "tn": 6, "q": "אדם הסיע נוסעים במושב האחורי של מכוניתו ,אולם אחת מהדלתות האחוריות של המכונית לא הייתה סגורה כראוי .במהלך נסיעה בעיקול חד הדלת נפתחה וסיכנה את הנוסע שישב לידה .מי אחראי לסכנה שנוצרה?", "opts": ["הנהג אחראי כי הוא חייב לוודא שכל הדלתות של כלי הרכב סגורות כראוי לפני שיתחיל בנסיעה.", "רק הנוסע שישב ליד הדלת אחראי כי הוא שסגר אותה לפני תחילת הנסיעה.", "הנהג אחראי רק אם הנוסע שישב ליד הדלת הוא קטין ,אך אם הנוסע אינו קטין, הנוסע הוא שאחראי על סגירת הדלת.", "לאיש אין אחריות על מקרה כזה כי מדובר בתקלה ולא במעשה מכוון."], "ans": 0, "media": null}, {"id": "6.14", "tn": 6, "q": "איזה מהמשפטים האלה נכון?", "opts": ["מספר האנשים המורשים לנסוע בכלי רכב הוא כמספר חגורות הבטיחות התקינות המותקנות בו.", "האחריות לחגירת חגורת הבטיחות היא רק של הנוסע ,ותלויה ברצונו בלבד.", "האחריות לחגירת חגורת הבטיחות היא של הנהג בלבד ,והוא רשאי להסכים שהנוסעים לא יהיו חגורים.", "אין קשר בין מספר חגורות הבטיחות ובין מספר הנוסעים."], "ans": 0, "media": null}, {"id": "7.1", "tn": 7, "q": "מתי יש להדליק את פנס החזית ואת הפנס האחורי באופנוע?", "opts": ["רק בעת הנהיגה בחורף.", "רק בעת הנהיגה בלילה בכל דרך.", "בעת הנהיגה ביום ובלילה ,בכל דרך ובכל ימות השנה.", "בעת הנהיגה בשעות היום בלבד ,בכל דרך ובכל ימות השנה."], "ans": 2, "media": null}, {"id": "7.2", "tn": 7, "q": "האם מותר לכלי רכב דו־גלגלי לנוע לצידו של כלי רכב דו־גלגלי אחר?", "opts": ["מותר בדרך עירונית בלבד.", "אסור בכל מצב.", "מותר תמיד.", "אסור ,אלא לצורך עקיפתו."], "ans": 3, "media": null}, {"id": "7.3", "tn": 7, "q": "האם רוכב אופנוע רשאי להחנות את האופנוע בתחנ , "media": null}, {"id": "16.34", "tn": 16, "q": "מה הסכנה בעקיפה בכביש דו־סטרי?", "opts": ["כלי רכב אחר עלול להגיע מן הנתיב הנגדי. עליו להאט אם הדבר יסייע לנהג העוקף להשלים את העקיפה בבטחה.", "עקיפה כזו נמשכת זמן רב. עליו להאט בתחילת העקיפה ולהאיץ בסופה.", "אין סכנה בעקיפה בכביש דוסטרי. עליו לשמור בכל מקרה על מהירות קבועה.", "כלי הרכב הנעקף עלול להיצמד לקצה הימני של הנתיב. .16.35האם הנוהג בכלי רכב חייב להאט בזמן שכלי רכב אחר עוקף אותו? עליו לשמור על מהירות זהה לזו של כלי הרכב העוקף."], "ans": 0, "media": null}, {"id": "16.36", "tn": 16, "q": "באיזה מצב מותר לעקוף בכביש דו־סטרי כמה כלי רכב בעקיפה אחת?", "opts": ["רק כאשר אפשר להשלים את העקיפה ללא סיכון.", "רק כאשר לא עוקפים כלי רכב כבדים.", "רק כאשר עוקפים בדרך ביןעירונית.", "החוק אוסר לעקוף בכביש דוסטרי כמה כלי רכב בעקיפה אחת."], "ans": 0, "media": null}, {"id": "16.37", "tn": 16, "q": "אתם נוהגים בכביש דו־סטרי ומכונית אחרת עוקפת את מכוניתכם .כיצד עליכם לנהוג?", "opts": ["אין לכם עניין במכונית העוקפת ועליכם להמשיך בנסיעתכם כרגיל.", "עליכם לעצור בצד הדרך ולאפשר למכונית העוקפת לחלוף על פניכם במהירות.", "עליכם להיצמד ככל האפשר לשפת הכביש הימנית ולאפשר לנהג העוקף להשלים את העקיפה בבטחה.", "עליכם להמשיך בנסיעה במרכז הנתיב הימני בלי לשנות את מהירותכם."], "ans": 2, "media": null}, {"id": "16.38", "tn": 16, "q": "האם הנוהג בכלי רכב שנעקף על ידי כלי רכב אחר חייב להאט כשהוא נעקף?", "opts": ["עליו להאט אם יסייע בכך לנהג של כלי הרכב העוקף להשלים את העקיפה בבטחה.", "עליו להאט בכל מקרה שבו הוא נעקף ובמשך כל הזמן שבו הוא נעקף.", "עליו להמשיך ולנסוע במהירות קבועה – לא להאט ולא להאיץ.", "עליו להפחית לפחות  10קמ\"ש ממהירות נסיעתו בזמן שהוא נעקף."], "ans": 0, "media": null}, {"id": "16.39", "tn": 16, "q": "איזה מהתנאים האלה מצדיק עקיפת כלי רכב שנוסע מלפנים?", "opts": ["העקיפה מותרת בקטע הכביש שבו נוסעים שני כלי הרכב.", "יש הפרש משמעותי בין מהירות כלי הרכב העוקף ובין מהירות כלי הרכב הנעקף.", "אין תנאים המצדיקים עקיפה.", "כלי הרכב הנעקף נוסע במהירות המרבית המותרת בקטע הדרך שבו נוהגים."], "ans": 1, "media": null}, {"id": "16.40", "tn":  גבוה המתאים לשיפוע הדרך וללחוץ ברציפות על בלם הרגל כדי להאט.", "יש להאט בהדרגה בעזרת בלם הרגל ולשלב להילוך נמוך המתאים לשיפוע הדרך.", "יש להשתמש במערכת הבלמים בלבד ,ללא התאמה מיוחדת של ההילוכים.", "יש לעצור את כלי הרכב בבטחה ,לשלב להילוך מתאים ולהמשיך בנסיעה."], "ans": 1, "media": {"t": "i", "u": "https://wsrv.nl/?url=drive.google.com/uc?id=1V1WGMitd4JxqK_dJrIB7SACg8BBO4VgK"}}, {"id": "19.15", "tn": 19, "q": "איזה מהגורמים האלה מצדיק ירידה בלתי מתוכננת ומהירה מהכביש אל שול הדרך?", "opts": ["הופעת גורם מפתיע ומפריע בנתיב הנסיעה של הנהג.", "תקלה באחד מהפנסים הקדמיים של כלי הרכב.", "מענה לשיחה דחופה בטלפון נייד שנמצא בכלי הרכב.", "עצירה של כלי רכב אחר בנתיב הנגדי ללא מתן אות מתאים."], "ans": 0, "media": null}, {"id": "19.16", "tn": 19, "q": "מהי הסכנה העיקרית בבלימה בזמן ירידה בלתי מתוכננת מהכביש אל שול הדרך?", "opts": ["סחרור של כלי הרכב בנסיעה על סוגי מצע שונים (אספלט ,כורכר ,חול וכד').", "סחרור של כלי הרכב על הכביש ואובדן השליטה עליו בשל נעילת הגלגלים הקדמיים.", "אובדן יכולת ההיגוי בכלי הרכב בשל שימוש מופרז בבלמים.", "אובדן יכולת הבלימה של כלי הרכב במקרה של לחץ אוויר עודף בצמיגים."], "ans": 0, "media": null}, {"id": "19.17", "tn": 19, "q": "באיזה מקרה מותר למכונית לנסוע בשול הדרך?", "opts": ["כשהנהג מעוניין לפנות ימינה ונתיב הנסיעה עמוס במכוניות שממשיכות ישר.", "למכונית מותר לנסוע בשול הדרך כאשר הנהג צריך לתת זכות קדימה לאוטובוס שנוסע מאחוריו.", "למונית מותר לנסוע בשול הדרך כדי לעקוף כלי רכב העומדים בצומת.", "למכונית שנוסעת באיטיות בגלל שהיא עמוסה ,מותר לנסוע בשול הדרך כדי למנוע הפרעה לתנועה."], "ans": 3, "media": null}, {"id": "19.18", "tn": 19, "q": "מדוע חשוב שנהג המתכנן לרדת לשול הדרך יבדוק את מצב התנועה שמאחוריו?", "opts": ["אין כל חשיבות לבדיקת מצב התנועה שמאחור אם הנהג אותת על כוונתו לרדת לשול.", "כדי לא לפגוע ברוכבי אופניים שעשויים לנסוע לפניו בשול.", "מפני שהעצירה בשול אסורה בכל מקרה.", "מפני שהאטה לפני הירידה לשול עלולה לגרום לכלי הרכב שנוסע מאחור להתנגש בכלי הרכב שיורד לשול."], "ans": 3, "media": null}, {"id": "19.19", "tn": 19, "q": "האם מותר לתקן כלי רכב בצד הדרך?", "opts": ["מותר לתקן בצד הדרך כל תקלה שהתגלתה בכלי הרכב.", "מותר רק אם התיקון קשור למערכת החשמל והתקלה אינה מונעת את הנסיעה בכלי הרכב במקרה הצורך.", "מותר רק אם התקלה היא קלה ורק בתנאי שביצוע התיקון לא יפריע לעוברי דרך אחרים.", "מותר לתקן כלי רכב בצד הדרך רק אם המקום סמוך למוסך."], "ans": 2, "media": null}, {"id": "19.20", "tn": 19, "q": "כיצד יש לסמן כלי רכב אם היה הכרח להעמידו בשול הדרך בגלל תקלה?", "opts": ["יש להפעיל את מחווני האיתות הימניים.", "יש להדליק את פנסי החזית ולהשאיר אותם דולקים עד לפינוי כלי הרכב.", "יש להציב פנס מהבהב בצבע צהוב שייראה למרחק של  30מטר לפחות.", "יש להציב מאחורי כלי הרכב משולש אזהרה שייראה למרחק של  100מטר לפחות."], "ans": 3, "media": null}, {"id": "19.21", "tn": 19, "q": "איזה מהמצבים האלה מצדיק ירידה מהכביש לשול הדרך?", "opts": ["תקר (\"פנצ'ר\") באחד מגלגלי כלי הרכב.", "תקלה באחד מהפנסים הקדמיים של כלי הרכב.", "מענה לשיחה דחופה בטלפון הנייד שבכלי הרכב.", "עצירה של כלי רכב אחר בנתיב הנגדי ללא מתן אות מתאים."], "ans": 0, "media": null}, {"id": "19.22", "tn": 19, "q": "כאשר יש לנסוע לאחור – איזה מהתנאים האלה חייב להתקיים?", "opts": ["הנסיעה לאחור לא תסכן את משתמשי הדרך האחרים ולא תפריע להם.", "כלי הרכב שנוסע לאחור ייסע סמוך למדרכה ובמקביל אליה.", "אדם מחוץ לכלי הרכב יכוון את הנהג.", "חיישני הנסיעה לאחור פועלים באופן תקין."], "ans": 0, "media": null}, {"id": "19.23", "tn": 19, "q": "מהי הסכנה העיקרית בעת נסיעה לאחור?", "opts": ["פגיעה במשתמשי דרך אחרים שאי אפשר להבחין בהם.", "קושי לשלוט בקצב הנסיעה משום שיש רק הילוך אחורי אחד.", "פגיעה בצמיגי כלי הרכב בעת התקרבות לעצמים חדים.", "פגיעה במערכת ההיגוי בגלל היגוי הפוך."], "ans": 0, "media": null}, {"id": "19.24", "tn": 19, "q": "האם מיקומו של כלי הרכב בתוך העקומה נכון?", "opts": ["כלי הרכב נוסע קרוב למרכז הכביש והוא עלול לסכן כלי רכב שנוסעים בנתיב הנגדי ,ולכן מיקומו אינו נכון.", "בנסיעה בעקומה חדה יש לקצר את משך השהות עקומה ,ולכן מיקומו נכון", "בעקומות חדות יש לנסוע סמוך למרכז הכביש כדי להקטין את הכוח הצנטריפוגלי ,ולכן מיקומו נכון.", "כשאין כלי רכב אחר שנוסע בעקומה אין חשיבות למ a": null}, {"id": "20.19", "tn": 20, "q": "מהן הבעיות המיוחדות הנגרמות בנהיגה בלילה?", "opts": ["תפקוד לקוי של הנהג בגלל תאורת הדרכים שמחוץ לכלי הרכב.", "הגבלת טווח הראייה של הנהג ופגיעה ביכולת שלו לאמוד מרחקים.", "הגדלת נפח התנועה בדרכים בשעות החשכה.", "ירידה בהספק המנוע בשל הפעלת מערכת התאורה."], "ans": 1, "media": null}, {"id": "20.20", "tn": 20, "q": "מהן הסכנות בנהיגה רצופה במשך שעות רבות?", "opts": ["התחממות של רפידות הבלמים ובלאי מואץ שלהם.", "עייפות ונטייה להירדמות של הנהג.", "לנהג בריא אין סכנה בנהיגה רצופה במשך שעות רבות.", "הספק (כוח) המנוע יורד ואיתו יורד כושר הבלימה."], "ans": 1, "media": null}, {"id": "20.21", "tn": 20, "q": "האם הפסקה קצרה להתרעננות בזמן הנהיגה יכולה להפיג את העייפות של הנהג?", "opts": ["לא ,הפסקה קצרה אינה יעילה כלל בהקטנת העייפות.", "כן ,הפסקה קצרה מאפשרת נהיגה רצופה במשך שעות רבות.", "כן ,הפסקה קצרה מונעת את העייפות לחלוטין אם בזמן ההפסקה אוכלים ארוחה דשנה.", "כן ,הפסקה קצרה יכולה להפיג את העייפות ,אך לפרק זמן קצר בלבד."], "ans": 3, "media": null}, {"id": "20.22", "tn": 20, "q": "כיצד אפשר להתגבר על בעיית העייפות בזמן הנהיגה?", "opts": ["על ידי מנוחה מספקת לפני תחילת הנהיגה והפסקות למנוחה במהלך הנסיעה.", "על ידי נהיגה במהירות נמוכה ,המונעת את היווצרות העייפות.", "על ידי אכילת ארוחה דשנה לפני הנסיעה ,המונעת הירדמות במהלך הנהיגה.", "על ידי עיסוק בפעילות גופנית מאומצת לפני הנסיעה."], "ans": 0, "media": null}, {"id": "20.23", "tn": 20, "q": "האם שתיית משקה אנרגיה יכולה למנוע את העייפות בזמן הנהיגה?", "opts": ["שתיית משקה אנרגיה יכולה להפיג את העייפות של הנהג אם הוא אינו רגיל לשתות משקאות המכילים קפאין.", "שתיית משקה אנרגיה יכולה להפיג את העייפות של נהג והיא הפעולה המומלצת כאשר הנהג מרגיש עייף.", "שתיית משקה אנרגיה אינה יכולה להפיג את העייפות של הנהג אפילו לזמן קצר.", "שתיית משקה אנרגיה מומלצת להפגת העייפות של נהג צעיר ובריא אך היא מסוכנת לרוכבים על כלי רכב דוגלגלי."], "ans": 0, "media": null}, {"id": "20.24", "tn": 20, "q": "אילו סכנות צפויות כאשר נוהגים ברציפות במשך שעות רבות?", "opts": ["ירידה של לחץ האוויר בצמיגי כלי הרכב.", "עייפות function shuffleQ(q){
  // Shuffle answer options while keeping each option's text, image and correctness together.
  var idx=q.opts.map((o,i)=>i).filter(i=>q.opts[i]!=='');
  var order=shuffle(idx);
  var nopts=[],nom=q.optmedia?[]:null,nans=0;
  order.forEach((src,dst)=>{ nopts[dst]=q.opts[src]; if(nom)nom[dst]=q.optmedia[src]; if(src===q.ans)nans=dst; });
  var r=Object.assign({},q,{opts:nopts,ans:nans});
  if(nom)r.optmedia=nom;
  return r;
}
function prepList(list,doShuffleQ){ return list.map(q=>doShuffleQ?shuffleQ(q):q); }
function byTopic(n){return QUESTIONS.filter(q=>q.tn===n);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function topicName(n){const t=TOPICS.find(x=>x.n===n);return t?t.name:'';}
function genPin(){return String(Math.floor(100000+Math.random()*900000));}
function mediaHTML(m){
  if(!m)return '';
  if(m.t==='y')return `<div class="qmedia"><a class="vbtn" href="${m.u}" target="_blank" rel="noopener">▶ סרטון</a></div>`;
  if(m.t==='multi'){return `<div class="qmedia multi">`+m.u.map(u=>`<img src="${u}" loading="lazy" onerror="this.outerHTML='<div class=ph>📷</div>'">`).join('')+`</div>`;}
  return `<div class="qmedia"><img src="${m.u}" loading="lazy" onerror="this.outerHTML='<div class=ph>📷 התמונה לא נטענה</div>'"></div>`;
}
function optLabel(o,i,om){var t=esc(o);if(om&&om[i]){return `<img class="optimg" src="${om[i]}" loading="lazy" alt="${t}" onerror="this.outerHTML='📷'"><span class="optcap">${t}</span>`;}return `<span>${t}</span>`;}


/* ===================== DUEL (1v1, separate phones) ===================== */
function duelSetup(){
  let topicOpts='<option value="all">כל הנושאים (מעורבב)</option>'+TOPICS.map(t=>`<option value="${t.n}">${esc(t.name)} (${byTopic(t.n).length})</option>`).join('');
  app.innerHTML=`<div class="hero fade"><h1 class="disp" style="font-size:24px">⚔️ דו-קרב</h1><p class="muted">פתח משחק ושלח את הקוד ליריב</p></div>
  <div class="card fade">
    <label>השם שלך</label><input class="inp" id="dname" maxlength="16" placeholder="הקלד שם" value="">
    <label>נושא</label><select class="inp" id="dtopic">${topicOpts}</select>
    <label>מספר שאלות</label><input class="inp" id="dcount" type="number" value="8" min="3" max="20">
    <button class="btn" onclick="createDuel()">צור דו-קרב ›</button>
    <button class="btn sec" onclick="home()">חזרה</button>
  </div>`;
}
function createDuel(){
  const name=(document.getElementById('dname').value||'').trim()||'שחקן 1';
  const tv=document.getElementById('dtopic').value;
  let count=Math.max(3,Math.min(20,parseInt(document.getElementById('dcount').value)||8));
  let pool=tv==='all'?QUESTIONS:byTopic(parseInt(tv));
  const list=shuffle(pool).slice(0,count).map(q=>shuffleQ(q)).map(q=>({q:q.q,opts:q.opts,ans:q.ans,media:q.media||null,optmedia:q.optmedia||null}));
  const pin=genPin(); const uid='h'+Date.now();
  S={role:'duelHost',pin,uid,name,total:count};
  db.ref('duels/'+pin).set({state:'waiting',questions:list,host:{uid,name,done:false,correct:0,time:0},createdAt:Date.now()}).then(()=>{
    db.ref('duels/'+pin).on('value',snap=>handleDuel(snap.val()));
  }).catch(e=>{app.innerHTML=`<div class="card"><div class="err">שגיאה: ${esc(e.message)}</div><button class="btn sec" onclick="home()">חזרה</button></div>`;});
}
function joinDuel(pin,name){
  const uid='g'+Date.now();
  S={role:'duelGuest',pin,uid,name};
  db.ref('duels/'+pin+'/guest').set({uid,name,done:false,correct:0,time:0});
  db.ref('duels/'+pin+'/guest').onDisconnect().remove();
  db.ref('duels/'+pin).on('value',snap=>handleDuel(snap.val()));
}
function handleDuel(d){
  if(!d){app.innerHTML=`<div class="bigmsg"><div class="big">👋</div><h2 class="disp">המשחק נסגר</h2><button class="btn" onclick="home()">חזרה</button></div>`;return;}
  S.duel=d;
  const iAmHost=S.role==='duelHost';
  // waiting for guest
  if(d.state==='waiting'){
    if(iAmHost){
      if(d.guest){ // guest joined -> start
        db.ref('duels/'+S.pin).update({state:'playing'});
        return;
      }
      if(S.view!=='dwait'){S.view='dwait';
        app.innerHTML=`<div class="hero fade"><h1 class="disp" style="font-size:22px">דו-קרב מוכן!</h1><p class="muted">שלח את הקוד ליריב</p></div>
          <div class="card fade center"><label>קוד</label><div class="pin">${S.pin}</div><p class="muted waitdots">ממתין שהיריב יצטרף</p>
          <button class="btn sec" onclick="cancelDuel()">בטל</button></div>`;
      }
    }
    return;
  }
  if(d.state==='playing'){ duelPlay(d); return; }
  if(d.state==='done'){ duelResult(d); return; }
}
function duelPlay(d){
  const me=S.role==='duelHost'?d.host:d.guest;
  if(me&&me.done){ duelWaitOther(d); return; }
  if(S.dQ==null)S.dQ=0;
  if(S.view==='dq'+S.dQ)return; S.view='dq'+S.dQ; S.dAnswered=false;
  const q=d.questions[S.dQ];
  S.dStart=Date.now();
  const opp=S.role==='duelHost'?d.guest:d.host;
  app.innerHTML=`<div class="vs fade">
      <div class="pl me"><div class="pn">${esc(me.name)}</div><div class="ps">${me.correct||0}</div></div>
      <div class="vsmid">VS</div>
      <div class="pl"><div class="pn">${esc(opp?opp.name:'יריב')}</div><div class="ps">${opp?opp.correct||0:0}</div></div>
    </div>
    <div class="qmeta fade"><span>שאלה ${S.dQ+1}/${d.questions.length}</span></div>
    <div class="qbox fade">${mediaHTML(q.media)}<div class="qtext">${esc(q.q)}</div>
      <div class="ans-grid">${q.opts.map((o,i)=>o===''?'':`<button class="ans a${i}" onclick="duelAnswer(${i})"><span class="lt">${LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}</button>`).join('')}</div>
      <div id="dfb"></div></div>`;
}
function duelAnswer(i){
  if(S.dAnswered)return;S.dAnswered=true;
  const d=S.duel,q=d.questions[S.dQ],ok=i===q.ans;
  document.querySelectorAll('.ans').forEach(b=>{b.disabled=true;});
  S.dCorrect=(S.dCorrect||0)+(ok?1:0);
  S.dTime=(S.dTime||0)+(Date.now()-S.dStart)/1000;
  const fb=document.getElementById('dfb');
  fb.innerHTML=`<div class="bigmsg" style="padding:14px 0"><p class="disp" style="font-size:20px;color:${ok?'var(--green)':'var(--red)'}">${ok?'✓ נכון!':'✗ טעות · נכון: '+LETTERS[q.ans]}</p></div>
    <button class="btn" onclick="duelNext()">${S.dQ>=d.questions.length-1?'סיום':'הבא ›'}</button>`;
  // write live score
  const path='duels/'+S.pin+'/'+(S.role==='duelHost'?'host':'guest');
  db.ref(path).update({correct:S.dCorrect,time:S.dTime});
}
function duelNext(){
  const d=S.duel;
  if(S.dQ>=d.questions.length-1){
    const path='duels/'+S.pin+'/'+(S.role==='duelHost'?'host':'guest');
    db.ref(path).update({done:true,correct:S.dCorrect||0,time:S.dTime||0});
    // if both done -> mark done
    db.ref('duels/'+S.pin).once('value').then(s=>{const dd=s.val();if(dd&&dd.host&&dd.host.done&&dd.guest&&dd.guest.done){db.ref('duels/'+S.pin).update({state:'done'});}});
    duelWaitOther(d);
    return;
  }
  S.dQ++; duelPlay(S.duel);
}
function duelWaitOther(d){
  if(S.view==='dwaitother')return;S.view='dwaitother';
  app.innerHTML=`<div class="bigmsg fade"><div class="big">⏳</div><h2 class="disp">סיימת!</h2><p class="muted">הניקוד שלך: ${S.dCorrect||0}</p><p class="muted waitdots">ממתין שהיריב יסיים</p></div>`;
}
function duelResult(d){
  clearInterval(S.timer);
  const h=d.host||{},g=d.guest||{};
  const iAmHost=S.role==='duelHost';
  const me=iAmHost?h:g, opp=iAmHost?g:h;
  let outcome,emoji;
  if((me.correct||0)>(opp.correct||0)){outcome='ניצחת! 🎉';emoji='👑';}
  else if((me.correct||0)<(opp.correct||0)){outcome='הפסדת';emoji='😕';}
  else{ // tie -> faster wins
    if((me.time||999)<(opp.time||999)){outcome='ניצחת! (מהיר יותר) 🎉';emoji='👑';}
    else if((me.time||999)>(opp.time||999)){outcome='הפסדת (לאט יותר)';emoji='😕';}
    else{outcome='תיקו!';emoji='🤝';}
  }
  app.innerHTML=`<div class="bigmsg fade"><div class="big">${emoji}</div><h2 class="disp">${outcome}</h2></div>
    <div class="vs fade" style="margin-top:10px">
      <div class="pl me"><div class="pn">${esc(me.name||'אתה')}</div><div class="ps">${me.correct||0}</div></div>
      <div class="vsmid">:</div>
      <div class="pl"><div class="pn">${esc(opp.name||'יריב')}</div><div class="ps">${opp.correct||0}</div></div>
    </div>
    <button class="btn" onclick="cleanupDuel()">משחק חדש</button>`;
}
function cancelDuel(){if(S.pin)db.ref('duels/'+S.pin).remove();home();}
function cleanupDuel(){if(S.role==='duelHost'&&S.pin)db.ref('duels/'+S.pin).remove();home();}

function hostSetup(){
  let topicOpts='<option value="all">כל הנושאים (מעורבב)</option>'+TOPICS.map(t=>`<option value="${t.n}">${esc(t.name)} (${byTopic(t.n).length})</option>`).join('');

  <div class="card fade">
    <label>נושא</label><select class="inp" id="htopic">${topicOpts}</select>
    <div class="setup-row">
      <div><label>מספר שאלות</label><input class="inp" id="hcount" type="number" value="10" min="3" max="30"></div>

    </div>
    <button class="btn" onclick="createRoom()">צור חדר 🎮</button>
    <button class="btn sec" onclick="home()">חזרה</button>

}
function createRoom(){
  const tv=document.getElementById('htopic').value;
  let count=Math.max(3,Math.min(30,parseInt(document.getElementById('hcount').value)||10));
  let time=Math.max(5,Math.min(60,parseInt(document.getElementById('htime').value)||20));
  let pool=tv==='all'?QUESTIONS:byTopic(parseInt(tv));
  const list=shuffle(pool).slice(0,count).map(q=>shuffleQ(q)).map(q=>({q:q.q,opts:q.opts,ans:q.ans,media:q.media||null,optmedia:q.optmedia||null}));
  const pin=genPin();
  S={role:'host',pin,time};
  const room={state:'lobby',time,qIndex:-1,questions:list,players:{},createdAt:Date.now()};
  db.ref('rooms/'+pin).set(room).then(()=>{
    db.ref('rooms/'+pin+'/players').on('value',snap=>{S.players=snap.val()||{};if(S.view==='lobby')renderLobby();});
    renderLobby();
  }).catch(e=>{app.innerHTML=`<div class="card"><div class="err">שגיאה ביצירת החדר: ${esc(e.message)}</div><button class="btn sec" onclick="home()">חזרה</button></div>`;});
}
function renderLobby(){
  S.view='lobby';
  const players=Object.values(S.players||{});
  let chips=players.length?players.map(p=>`<div class="pchip">${esc(p.name)}</div>`).join(''):'<p class="muted waitdots">ממתינים לשחקנים</p>';
  app.innerHTML=`<div class="hero fade"><h1 class="disp" style="font-size:22px">הצטרפו למשחק!</h1>
    <p class="muted">היכנסו לקישור הזה והקלידו את הקוד</p></div>
  <div class="card fade center">
    <label>קוד החדר</label><div class="pin">${S.pin}</div>
    <div class="players-grid">${chips}</div>
    <p class="muted">${players.length} שחקנים מחוברים</p>
    <button class="btn" onclick="startGame()" ${players.length<1?'disabled':''}>התחל משחק ›</button>
    <button class="btn sec" onclick="closeRoom()">בטל משחק</button>
  </div>`;
}
function startGame(){ S.qIndex=-1; nextHostQuestion(); }
function nextHostQuestion(){
  db.ref('rooms/'+S.pin+'/questions').once('value').then(snap=>{
    const qs=snap.val()||[];
    S.qIndex=(S.qIndex==null?-1:S.qIndex)+1;
    if(S.qIndex>=qs.length){ endGame(); return; }
    S.curQ=qs[S.qIndex]; S.totalQ=qs.length;
    db.ref('rooms/'+S.pin).update({state:'question',qIndex:S.qIndex,qStart:firebase.database.ServerValue.TIMESTAMP});
    // clear answers for this q
    db.ref('rooms/'+S.pin+'/answers/'+S.qIndex).remove();
    renderHostQuestion();
  });
}
function renderHostQuestion(){
  S.view='hostq';
  const q=S.curQ; let t=S.time;
  let answered=0;
  app.innerHTML=`<div class="qmeta fade"><span>שאלה ${S.qIndex+1}/${S.totalQ}</span><span id="acount">0 ענו</span></div>
    <div class="timer-bar"><div class="tf" id="tf" style="width:100%"></div></div>
    <div class="qbox fade">${mediaHTML(q.media)}<div class="qtext">${esc(q.q)}</div>
      <div class="ans-grid">${q.opts.map((o,i)=>o===''?'':`<div class="ans a${i}"><span class="lt">${LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}</div>`).join('')}</div>
    </div>
    <button class="btn" id="revealBtn" onclick="revealAnswer()">הצג תשובה ›</button>`;
  // listen answers
  db.ref('rooms/'+S.pin+'/answers/'+S.qIndex).on('value',snap=>{
    const a=snap.val()||{};const n=Object.keys(a).length;
    const el=document.getElementById('acount');if(el)el.textContent=n+' ענו';
  });
  clearInterval(S.timer);
  S.timer=setInterval(()=>{t--;const tf=document.getElementById('tf');if(tf)tf.style.width=Math.max(0,t/S.time*100)+'%';if(t<=0){clearInterval(S.timer);revealAnswer();}},1000);
}
function revealAnswer(){
  clearInterval(S.timer);
  db.ref('rooms/'+S.pin+'/answers/'+S.qIndex).off();
  const q=S.curQ;
  // compute scores
  db.ref('rooms/'+S.pin+'/answers/'+S.qIndex).once('value').then(snap=>{
    const answers=snap.val()||{};
    const updates={};
    Object.entries(answers).forEach(([uid,a])=>{
      if(a.choice===q.ans){
        const pts=Math.round(500+500*Math.max(0,(S.time-(a.t||0))/S.time));
        updates['rooms/'+S.pin+'/players/'+uid+'/score']=(S.players[uid]?.score||0)+pts;
      }
    });
    db.ref().update(updates);
    db.ref('rooms/'+S.pin).update({state:'reveal'});
    renderHostReveal(answers);
  });
}
function renderHostReveal(answers){
  S.view='hostreveal';
  const q=S.curQ;
  const counts=[0,0,0,0];Object.values(answers).forEach(a=>{if(a.choice>=0&&a.choice<4)counts[a.choice]++;});
  app.innerHTML=`<div class="qmeta fade"><span>שאלה ${S.qIndex+1}/${S.totalQ}</span><span>תשובה נכונה: ${LETTERS[q.ans]}</span></div>
    <div class="qbox fade"><div class="qtext">${esc(q.q)}</div>
      <div class="ans-grid">${q.opts.map((o,i)=>o===''?'':`<div class="ans a${i}" style="${i===q.ans?'':'opacity:.4'}"><span class="lt">${i===q.ans?'✓':LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}<span class="optcount"> (${counts[i]})</span></div>`).join('')}</div>
    </div>
    <button class="btn" onclick="showScores()">טבלת מובילים ›</button>`;
}
function showScores(){
  db.ref('rooms/'+S.pin+'/players').once('value').then(snap=>{
    const players=snap.val()||{};
    const ranked=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
    let rows=ranked.map((p,i)=>`<div class="lbrow ${i===0?'gold':''}"><div class="rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</div><div class="nm">${esc(p.name)}</div><div class="sc">${p.score||0}</div></div>`).join('');
    const last=S.qIndex>=S.totalQ-1;
    app.innerHTML=`<div class="hero fade"><h1 class="disp" style="font-size:22px">טבלת מובילים</h1></div>
      <div class="lb fade">${rows}</div>
      <button class="btn" onclick="nextHostQuestion()">${last?'סיום המשחק':'השאלה הבאה ›'}</button>`;
  });
}
function endGame(){
  db.ref('rooms/'+S.pin).update({state:'ended'});
  db.ref('rooms/'+S.pin+'/players').once('value').then(snap=>{
    const players=snap.val()||{};
    const ranked=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0));
    let rows=ranked.map((p,i)=>`<div class="lbrow ${i===0?'gold':''}"><div class="rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</div><div class="nm">${esc(p.name)}</div><div class="sc">${p.score||0}</div></div>`).join('');
    app.innerHTML=`<div class="bigmsg fade"><div class="big">🏆</div><h2 class="disp">המשחק הסתיים!</h2>
      ${ranked[0]?'<p class="muted">הזוכה: '+esc(ranked[0].name)+'</p>':''}</div>
      <div class="lb fade">${rows}</div>
      <button class="btn" onclick="cleanupAndHome()">משחק חדש</button>`;
  });
}
function closeRoom(){ if(S.pin)db.ref('rooms/'+S.pin).remove(); home(); }
function cleanupAndHome(){ if(S.pin)db.ref('rooms/'+S.pin).remove(); home(); }

/* ===================== PLAYER (student) ===================== */
function joinScreen(){
  app.innerHTML=`<div class="hero fade"><div class="logo">📱</div><h1 class="disp" style="font-size:24px">הצטרפות למשחק</h1></div>
  <div class="card fade">
    <label>קוד החדר</label><input class="inp pin-input" id="jpin" inputmode="numeric" maxlength="6" placeholder="______">
    <label>השם שלך</label><input class="inp" id="jname" maxlength="16" placeholder="הקלד שם">
    <div id="jerr"></div>
    <button class="btn" onclick="doJoin()">הצטרף ›</button>
    <button class="btn sec" onclick="home()">חזרה</button>
  </div>`;
}
function doJoin(){
  const pin=(document.getElementById('jpin').value||'').trim();
  const name=(document.getElementById('jname').value||'').trim();
  const errEl=document.getElementById('jerr');
  if(pin.length!==6){errEl.innerHTML='<div class="err">קוד חייב להיות 6 ספרות</div>';return;}
  if(!name){errEl.innerHTML='<div class="err">הקלד שם</div>';return;}
  // check duel first
  db.ref('duels/'+pin).once('value').then(snap=>{
    const duel=snap.val();
    if(duel){
      if(duel.guest){errEl.innerHTML='<div class="err">הדו-קרב כבר תפוס</div>';return;}
      if(duel.state!=='waiting'){errEl.innerHTML='<div class="err">המשחק כבר התחיל</div>';return;}
      joinDuel(pin,name); return;
    }
    // else check group room
    db.ref('rooms/'+pin).once('value').then(s2=>{
      const room=s2.val();
      if(!room){errEl.innerHTML='<div class="err">לא נמצא משחק עם הקוד הזה</div>';return;}
      if(room.state!=='lobby'){errEl.innerHTML='<div class="err">המשחק כבר התחיל</div>';return;}
      const uid='p'+Date.now()+Math.floor(Math.random()*1000);
      S={role:'player',pin,uid,name};
      db.ref('rooms/'+pin+'/players/'+uid).set({name,score:0});
      db.ref('rooms/'+pin+'/players/'+uid).onDisconnect().remove();
      listenAsPlayer();
    });
  });
}
function listenAsPlayer(){
  db.ref('rooms/'+S.pin).on('value',snap=>{
    const room=snap.val();
    if(!room){ app.innerHTML=`<div class="bigmsg"><div class="big">👋</div><h2 class="disp">המשחק נסגר</h2><button class="btn" onclick="home()">חזרה</button></div>`; return; }
    S.room=room;
    if(room.state==='lobby') playerLobby();
    else if(room.state==='question') playerQuestion(room);
    else if(room.state==='reveal') playerReveal(room);
    else if(room.state==='ended') playerEnded(room);
  });
}
function playerLobby(){
  if(S.view==='plobby')return;S.view='plobby';
  app.innerHTML=`<div class="bigmsg fade"><div class="big">✅</div><h2 class="disp">${esc(S.name)}</h2>
    <p class="muted waitdots">מחכים שהמורה יתחיל</p></div>`;
}
function playerQuestion(room){
  const qi=room.qIndex;
  if(S.view==='pq'+qi)return; S.view='pq'+qi; S.answeredQ=false;
  S.qStartLocal=Date.now();
  const q=room.questions[qi];
  app.innerHTML=`<div class="qmeta fade"><span>שאלה ${qi+1}/${room.questions.length}</span><span id="ptime">⏱ ${room.time}</span></div>
    <div class="timer-bar"><div class="tf" id="tf" style="width:100%"></div></div>
    <div class="qbox fade"><div class="qtext">${esc(q.q)}</div>
    <div class="ans-grid">${q.opts.map((o,i)=>o===''?'':`<button class="ans a${i}" onclick="playerAnswer(${i})"><span class="lt">${LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}</button>`).join('')}</div>
    <div id="pfb"></div></div>`;
  let t=room.time;clearInterval(S.timer);
  S.timer=setInterval(()=>{t--;const tf=document.getElementById('tf'),lb=document.getElementById('ptime');if(tf)tf.style.width=Math.max(0,t/room.time*100)+'%';if(lb)lb.textContent='⏱ '+Math.max(0,t);if(t<=0)clearInterval(S.timer);},1000);
}
function playerAnswer(i){
  if(S.answeredQ)return;S.answeredQ=true;
  const elapsed=(Date.now()-S.qStartLocal)/1000;
  const qi=S.room.qIndex;
  db.ref('rooms/'+S.pin+'/answers/'+qi+'/'+S.uid).set({choice:i,t:elapsed});
  document.querySelectorAll('.ans').forEach(b=>b.disabled=true);
  document.getElementById('pfb').innerHTML='<div class="bigmsg" style="padding:18px 0"><p class="disp" style="font-size:22px;color:var(--accent)">נשלח! ✓</p><p class="muted waitdots">ממתינים לשאר</p></div>';
}
function playerReveal(room){
  if(S.view==='prev'+room.qIndex)return;S.view='prev'+room.qIndex;
  clearInterval(S.timer);
  const q=room.questions[room.qIndex];
  db.ref('rooms/'+S.pin+'/players/'+S.uid).once('value').then(snap=>{
    const me=snap.val()||{};
    const myAnsRef=room.answers&&room.answers[room.qIndex]&&room.answers[room.qIndex][S.uid];
    const ok=myAnsRef&&myAnsRef.choice===q.ans;
    app.innerHTML=`<div class="bigmsg fade"><div class="big">${ok?'🎉':'😕'}</div>
      <h2 class="disp">${ok?'נכון!':'לא נכון'}</h2>
      <p class="muted">התשובה הנכונה: ${LETTERS[q.ans]}</p>
      <div class="lbrow gold" style="margin-top:18px;justify-content:center"><div class="nm center">${esc(S.name)}</div><div class="sc">${me.score||0}</div></div>
      <p class="muted waitdots" style="margin-top:14px">ממתינים למורה</p></div>`;
  });
}
function playerEnded(room){
  clearInterval(S.timer);
  const ranked=Object.entries(room.players||{}).map(([uid,p])=>({uid,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
  const myRank=ranked.findIndex(p=>p.uid===S.uid)+1;
  const me=ranked.find(p=>p.uid===S.uid)||{};
  app.innerHTML=`<div class="bigmsg fade"><div class="big">${myRank===1?'🏆':'🎮'}</div>
    <h2 class="disp">המשחק הסתיים!</h2>
    <p class="muted">המקום שלך: ${myRank} · ${me.score||0} נקודות</p></div>
    <div class="lb fade">${ranked.slice(0,5).map((p,i)=>`<div class="lbrow ${p.uid===S.uid?'gold':''}"><div class="rank">${i+1}</div><div class="nm">${esc(p.name)}</div><div class="sc">${p.score||0}</div></div>`).join('')}</div>
    <button class="btn" onclick="home()">סיום</button>`;
}


/* ===================== SOLO PRACTICE MODES ===================== */
function header(title,back){return `<div class="topbar fade"><button class="back-btn" onclick="${back}">›</button><h2>${esc(title)}</h2><div class="spacer"></div></div>`;}
function pickTopic(mode){S.mode=mode;const title=mode==='learn'?'בחרו נושא ללימוד':'בחרו נושא למבחן';
  let rows=TOPICS.map(t=>{const c=byTopic(t.n).length;return `<button class="topic" onclick="startTopic('${mode}',${t.n})"><div class="n">${t.n}</div><div class="nm">${esc(t.name)}</div><div class="cnt">${c}</div></button>`;}).join('');
  app.innerHTML=header(title,'home()')+`<div class="topic-grid fade">${rows}</div>`;}

function startTopic(mode,tn){S={mode,tn,list:shuffle(byTopic(tn)).map(q=>shuffleQ(q)),idx:0,picks:[]};renderQ();}
function renderQ(){const q=S.list[S.idx],total=S.list.length,isLearn=S.mode==='learn';const pick=S.picks[S.idx];const answered=pick!=null;
  let opts=q.opts.map((o,i)=>{if(o==='')return '';let cls='opt';if(answered){if(i===q.ans)cls+=' correct';else if(i===pick)cls+=' wrong';else cls+=' dim';}
    return `<button class="${cls}" data-i="${i}" ${answered?'disabled':''} onclick="answer(${i})"><span class="lt">${LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}</button>`;}).join('');
  const correctCount=S.picks.filter((p,i)=>p!=null&&p===S.list[i].ans).length;
  app.innerHTML=header(topicName(S.tn),"pickTopic('"+S.mode+"')")+`
    <div class="progress fade"><div class="fill" style="width:${S.idx/total*100}%"></div></div>
    <div class="qmeta fade"><span>שאלה ${S.idx+1} מתוך ${total}</span>${isLearn?'<span>📚 לימוד</span>':'<span>✓ '+correctCount+'</span>'}</div>
    <div class="qcard">${mediaHTML(q.media)}<div class="qtext">${esc(q.q)}</div><div class="opts" id="opts">${opts}</div><div id="fb">${answered?fbHTML(pick===q.ans,q.ans):''}</div></div>`;}
function fbHTML(ok,ans){const last=S.idx>=S.list.length-1;
  return `<div class="feedback ${ok?'ok':'no'}">${ok?'✓ תשובה נכונה!':'✗ טעות. הנכונה: '+LETTERS[ans]}</div><div class="navrow">${S.idx>0?'<button class="btn prev" onclick="prevQ()">‹ הקודמת</button>':''}<button class="btn" onclick="nextQ()">${last?'סיום':'השאלה הבאה ›'}</button></div>`;}
function answer(i){if(S.picks[S.idx]!=null)return;S.picks[S.idx]=i;const q=S.list[S.idx];
  document.querySelectorAll('#opts .opt').forEach(b=>{const bi=+b.dataset.i;b.disabled=true;if(bi===q.ans)b.classList.add('correct');else if(bi===i)b.classList.add('wrong');else b.classList.add('dim');});
  document.getElementById('fb').innerHTML=fbHTML(i===q.ans,q.ans);
  document.getElementById('fb').scrollIntoView({behavior:'smooth',block:'nearest'});}
function prevQ(){if(S.idx>0){S.idx--;renderQ();}}
function nextQ(){S.idx++;if(S.idx>=S.list.length){S.correct=S.picks.filter((p,i)=>p!=null&&p===S.list[i].ans).length;topicResult();return;}renderQ();}
function topicResult(){
  if(S.mode==='learn'){app.innerHTML=`<div class="result"><div class="big">🎉</div><h2 class="disp">סיימת את הנושא!</h2><p class="muted">${esc(topicName(S.tn))} · ${S.list.length} שאלות</p><button class="btn" onclick="pickTopic('learn')">לנושא אחר</button><button class="btn sec" onclick="home()">תפריט ראשי</button></div>`;return;}
  const total=S.list.length,pct=Math.round(S.correct/total*100),pass=pct>=80;
  app.innerHTML=`<div class="result"><div class="big">${pass?'🏅':'💪'}</div><h2 class="disp">${pass?'כל הכבוד!':'עוד קצת תרגול'}</h2>
    <div class="scorebox"><div class="pct" style="color:${pass?'var(--green)':'var(--accent2)'}">${pct}%</div><div class="det">${S.correct} מתוך ${total} נכון</div><div class="grade ${pass?'pass':'fail'}">${pass?'עברת ✓':'לא עברת'}</div></div>
    <button class="btn" onclick="startTopic('test',${S.tn})">נסה שוב</button><button class="btn sec" onclick="pickTopic('test')">נושא אחר</button><button class="btn sec" onclick="home()">תפריט ראשי</button></div>`;}

function startGeneral(){S={mode:'general',list:shuffle(QUESTIONS).slice(0,30).map(q=>shuffleQ(q)),idx:0,picks:[]};renderGen();}
function renderGen(){const q=S.list[S.idx];const prev=S.picks[S.idx];
  let opts=q.opts.map((o,i)=>o===''?'':`<button class="opt ${prev===i?'sel':''}" data-i="${i}" onclick="answerGen(${i})"><span class="lt">${LETTERS[i]}</span>${optLabel(o,i,q.optmedia)}</button>`).join('');
  const last=S.idx>=29;
  const nextLabel=last?'סיום ובדיקת התוצאה ›':'השאלה הבאה ›';
  const nav=`<div class="navrow">${S.idx>0?'<button class="btn prev" onclick="prevGen()">‹ הקודמת</button>':''}<button class="btn" onclick="nextGen()" ${prev==null?'disabled style="opacity:.5"':''}>${nextLabel}</button></div>`;
  app.innerHTML=header('מבחן כללי','home()')+`<div class="progress fade"><div class="fill" style="width:${S.idx/30*100}%"></div></div>
    <div class="qmeta fade"><span>שאלה ${S.idx+1}/30</span><span>${S.picks.filter(p=>p!=null).length} נענו</span></div>
    <div class="qcard">${mediaHTML(q.media)}<div class="qtext">${esc(q.q)}</div><div class="opts" id="opts">${opts}</div>${nav}</div>`;}
function answerGen(i){S.picks[S.idx]=i;
  document.querySelectorAll('#opts .opt').forEach(b=>b.classList.toggle('sel',+b.dataset.i===i));
  const nb=document.querySelector('.navrow .btn:last-child');if(nb){nb.disabled=false;nb.style.opacity='1';}}
function prevGen(){if(S.idx>0){S.idx--;renderGen();}}
function nextGen(){if(S.picks[S.idx]==null)return;if(S.idx>=29){genResult();return;}S.idx++;renderGen();}
function genResult(){
  let correct=0;S.list.forEach((q,i)=>{if(S.picks[i]===q.ans)correct++;});
  const mistakes=30-correct,pass=mistakes<=6;
  let rows=S.list.map((q,i)=>{const ok=S.picks[i]===q.ans;
    return `<div class="rev ${ok?'rok':'rno'}"><span class="rn">${i+1}</span><span class="rq">${esc(q.q)}</span><span class="ri">${ok?'✓':'✗'}</span></div>`;}).join('');
  app.innerHTML=`<div class="result"><div class="big">${pass?'🎓':'😤'}</div><h2 class="disp">${pass?'עברת את המבחן!':'נכשלת'}</h2>
    <div class="scorebox"><div class="pct" style="color:${pass?'var(--green)':'var(--red)'}">${correct}/30</div><div class="det">${mistakes} טעויות</div><div class="grade ${pass?'pass':'fail'}">${pass?'עברת ✓ (עד 6 טעויות)':'נדרשות עד 6 טעויות'}</div></div>
    <h3 style="text-align:right;font-size:17px;font-weight:800;margin:18px 0 10px">פירוט השאלות:</h3>
    <div class="revlist">${rows}</div>
    <button class="btn" onclick="startGeneral()">מבחן חדש</button><button class="btn sec" onclick="home()">תפריט ראשי</button></div>`;}

/* ===================== MASTER HOME ===================== */
function home(){
  S={};
  app.innerHTML=`<div class="hero fade"><div class="logo">🚦</div><h1 class="disp">חידון תאוריה</h1>
    <p>תרגול למבחן · ${QUESTIONS.length} שאלות</p></div>
  <div class="modes fade">
    <button class="mode m1" onclick="pickTopic('learn')"><div class="ic">📚</div><div class="tx"><b>לימוד לפי נושא</b><span>לומדים שאלה־שאלה עם תשובות מיד</span></div><div class="arr">‹</div></button>
    <button class="mode m2" onclick="pickTopic('test')"><div class="ic">📝</div><div class="tx"><b>מבחן נושא</b><span>נבחנים על נושא שלם ומקבלים ציון</span></div><div class="arr">‹</div></button>
    <button class="mode m3" onclick="startGeneral()"><div class="ic">🎯</div><div class="tx"><b>מבחן כללי</b><span>30 שאלות · עד 6 טעויות עוברים</span></div><div class="arr">‹</div></button>
    <button class="mode m4" onclick="duelSetup()"><div class="ic">⚔️</div><div class="tx"><b>דו-קרב</b><span>אחד על אחד · טלפונים נפרדים</span></div><div class="arr">‹</div></button>
    <button class="mode m5" onclick="hostSetup()"><div class="ic">🏆</div><div class="tx"><b>משחק קבוצתי</b><span>מורה פותח · רבים מצטרפים</span></div><div class="arr">‹</div></button>
    <button class="mode m6" onclick="joinScreen()"><div class="ic">📱</div><div class="tx"><b>הצטרפות עם קוד</b><span>הכנס לדו-קרב או למשחק קבוצתי קיים</span></div><div class="arr">‹</div></button>
  </div>`;
}
home();
</script>
